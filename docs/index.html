<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>tic-tac-toe-lit — ByteChef Docs</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #07090f; color: #e2e8f0;
      font-family: 'Inter', sans-serif;
      min-height: 100vh; display: flex; align-items: center; justify-content: center;
      overflow: hidden;
    }
    canvas { position: fixed; inset: 0; z-index: 0; pointer-events: none; opacity: 0.5; }
    .card {
      position: relative; z-index: 1;
      background: rgba(255,255,255,0.04);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255,255,255,0.09);
      border-radius: 18px;
      padding: 56px 60px;
      text-align: center;
      max-width: 520px;
      width: 90%;
      animation: fadeUp .7s ease both;
    }
    @keyframes fadeUp { from { opacity:0; transform:translateY(28px); } to { opacity:1; transform:translateY(0); } }
    .badge {
      display: inline-block; margin-bottom: 24px;
      background: rgba(129,140,248,.12); color: #818cf8;
      border: 1px solid rgba(129,140,248,.25);
      padding: 5px 14px; border-radius: 100px;
      font-size: 12px; font-weight: 600; letter-spacing: .06em; text-transform: uppercase;
    }
    h1 {
      font-size: 2.4em; font-weight: 700; line-height: 1.15;
      background: linear-gradient(130deg, #e2e8f0 0%, #818cf8 55%, #c084fc 100%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
      margin-bottom: 16px;
    }
    p { color: #8892a4; font-size: 15px; line-height: 1.6; margin-bottom: 36px; }
    a.btn {
      display: inline-flex; align-items: center; gap: 8px;
      background: linear-gradient(135deg, #6366f1, #a855f7);
      color: #fff; text-decoration: none;
      padding: 13px 30px; border-radius: 10px;
      font-weight: 600; font-size: 15px;
      transition: opacity .2s, transform .2s;
      box-shadow: 0 4px 24px rgba(99,102,241,.35);
    }
    a.btn:hover { opacity: .88; transform: translateY(-1px); }
    .footer { margin-top: 32px; font-size: 12px; color: #4b5563; }
    .footer a { color: #6b7280; text-decoration: none; }
    .footer a:hover { color: #9ca3af; }
  </style>
</head>
<body>
<canvas id="c"></canvas>
<div class="card">
  <div class="badge">⚡ ByteChef</div>
  <h1>tic-tac-toe-lit</h1>
  <p>tic-tac-toe written in Lit + Typescript</p>
  <a class="btn" href="README.html">View Documentation →</a>
  <div class="footer">
    <a href="https://github.com/calvinbrown085/tic-tac-toe-lit" target="_blank">github.com/calvinbrown085/tic-tac-toe-lit</a>
  </div>
</div>
<script>
(function() {
  var c = document.getElementById('c'), ctx = c.getContext('2d');
  function resize() { c.width = innerWidth; c.height = innerHeight; }
  resize(); window.onresize = resize;
  var bs = [];
  for (var i = 0; i < 18; i++) bs.push({
    x: Math.random()*innerWidth, y: Math.random()*innerHeight,
    r: Math.random()*100+25, vy: -(Math.random()*.2+.06),
    vx: (Math.random()-.5)*.2, a: Math.random()*.06+.015,
    h: Math.random()>.5?240:275
  });
  function draw() {
    ctx.clearRect(0,0,c.width,c.height);
    bs.forEach(function(b) {
      var g = ctx.createRadialGradient(b.x,b.y,0,b.x,b.y,b.r);
      g.addColorStop(0,'hsla('+b.h+',70%,65%,'+b.a+')');
      g.addColorStop(1,'hsla('+b.h+',70%,65%,0)');
      ctx.beginPath(); ctx.arc(b.x,b.y,b.r,0,Math.PI*2);
      ctx.fillStyle=g; ctx.fill();
      b.x+=b.vx; b.y+=b.vy;
      if(b.y+b.r<0){b.y=innerHeight+b.r;b.x=Math.random()*innerWidth;}
      if(b.x<-b.r)b.x=innerWidth+b.r;
      if(b.x>innerWidth+b.r)b.x=-b.r;
    });
    requestAnimationFrame(draw);
  }
  draw();
})();
</script>
</body>
</html>
